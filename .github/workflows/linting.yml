---
name: Ansible CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ansible-lint
        run: pip install ansible-lint
      - name: Install Galaxy Modules
        run: ansible-galaxy install -r requirements/common.yml
      - name: Linting with ansible-lint
        run: ansible-lint
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC2034 -e SC2015 -e SC1091 -e SC1090
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint .
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check callback_plugins/
